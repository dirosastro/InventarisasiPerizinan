<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Siperjalan</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A5F',
                        secondary: '#2C5282',
                        accent: '#3182CE',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 font-sans h-screen flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-200">

    <div class="max-w-md w-full mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block mb-4 hover:scale-105 transition-transform">
                <img src="img/logo.png" alt="Logo Siperjalan" class="h-16 w-auto mx-auto">
            </a>
            <h1 class="text-2xl font-bold text-gray-900">Selamat Datang Kembali</h1>
            <p class="text-gray-500 text-sm mt-1">Masuk ke Dasbor Admin Siperjalan</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <div id="error-message" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-100 flex items-center gap-2">
                <i class="ph-fill ph-warning-circle text-lg"></i>
                <span>Username atau password salah! (Gunakan: admin / admin123)</span>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                    <div class="relative">
                        <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input type="text" id="username" required placeholder="Masukkan username" 
                            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-xs text-accent hover:text-secondary font-medium">Lupa sandi?</a>
                    </div>
                    <div class="relative">
                        <i class="ph ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full pl-10 pr-10 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all">
                        <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="ph ph-eye text-lg"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember" type="checkbox" class="w-4 h-4 text-accent border-gray-300 rounded focus:ring-accent">
                    <label for="remember" class="ml-2 block text-sm text-gray-600">Ingat saya</label>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-primary text-white font-semibold py-3 rounded-xl hover:bg-secondary transition-all flex items-center justify-center gap-2 shadow-md">
                    <i class="ph ph-sign-in"></i> Masuk Sekarang
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-gray-500 hover:text-accent font-medium flex items-center justify-center gap-1">
                    <i class="ph ph-arrow-left"></i> Kembali ke Beranda
                </a>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        const toggleBtn = document.getElementById('toggle-password');
        const passInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            toggleBtn.innerHTML = type === 'password' ? '<i class="ph ph-eye text-lg"></i>' : '<i class="ph ph-eye-slash text-lg"></i>';
        });

        // Handle Login Submission
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');
            const errorMsg = document.getElementById('error-message');

            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i>';
            btn.disabled = true;

            // Simulasi loading 1 detik
            setTimeout(() => {
                // Hardcode logic: admin / admin123
                if (user === 'admin' && pass === 'admin123') {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = '<i class="ph ph-sign-in"></i> Masuk Sekarang';
                    btn.disabled = false;
                }
            }, 800);
        });

        // Redirect if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
