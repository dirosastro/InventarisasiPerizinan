<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Tester | Siperjalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f4f8;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-card rounded-3xl p-8 space-y-6">
        <div class="text-center space-y-2">
            <div
                class="w-16 h-16 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="ph-fill ph-whatsapp-logo text-4xl"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">WhatsApp Bot Tester</h1>
            <p class="text-sm text-gray-500">Gunakan halaman ini untuk memverifikasi apakah bot WhatsApp Siperjalan
                aktif dan bisa mengirim pesan.</p>
        </div>

        <div id="status-alert" class="hidden p-4 rounded-xl text-sm font-medium border animate-pulse"></div>

        <form id="test-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Nomor
                    WhatsApp</label>
                <div class="relative">
                    <i class="ph ph-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="text" id="phone_number" required placeholder="Contoh: 087758525792"
                        class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Pesan
                    Tes</label>
                <textarea id="message" required rows="6"
                    class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all">🔔 *TES SISTEM SIPERJALAN*

Halo *[Nama Pemohon]*,
Pesan ini dikirim untuk memverifikasi sistem notifikasi WhatsApp.

📌 *Pemohon:* [Nama Pemohon]
📌 *No. HP:* [Nomor HP]
📌 *Ruas Jalan:* [Nama Ruas Jalan]

Bot Berjalan Normal! ✅</textarea>
            </div>

            <button type="submit" id="btn-send"
                class="w-full py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-2xl shadow-lg shadow-green-200 transition-all flex items-center justify-center gap-2 group">
                <span>Kirim Pesan Tes</span>
                <i
                    class="ph ph-paper-plane-tilt text-xl group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
            </button>
        </form>

        <div class="pt-4 border-t border-gray-100 flex items-center justify-between">
            <a href="perizinan.html"
                class="text-sm text-gray-400 hover:text-gray-600 flex items-center gap-1 transition-colors">
                <i class="ph ph-arrow-left"></i> Kembali ke Daftar
            </a>
            <span class="flex items-center gap-1.5 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Bot v1.0
            </span>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api/wa-test';

        document.getElementById('test-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btn-send');
            const alert = document.getElementById('status-alert');
            let number = document.getElementById('phone_number').value;
            // Hilangkan karakter + dan - jika ada
            number = number.replace(/[+-]/g, '');
            const message = document.getElementById('message').value;

            // Reset UI
            btn.disabled = true;
            btn.innerHTML = `<i class="ph ph-circle-notch animate-spin text-xl"></i> Sedang Mengirim...`;
            alert.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ number, message })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert.className = 'p-4 rounded-xl text-sm font-medium border bg-green-50 text-green-700 border-green-100';
                    alert.innerHTML = `<div class="flex items-center gap-2"><i class="ph-fill ph-check-circle text-lg"></i> ${result.message}</div>`;
                } else {
                    alert.className = 'p-4 rounded-xl text-sm font-medium border bg-red-50 text-red-700 border-red-100';
                    alert.innerHTML = `<div class="flex items-center gap-2"><i class="ph-fill ph-warning-circle text-lg"></i> ${result.message}</div>`;
                }
            } catch (error) {
                alert.className = 'p-4 rounded-xl text-sm font-medium border bg-red-50 text-red-700 border-red-100';
                alert.innerHTML = `<div class="flex items-center gap-2"><i class="ph-fill ph-x-circle text-lg"></i> Gagal menghubungi server Laravel!</div>`;
            } finally {
                alert.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = `<span>Kirim Pesan Tes</span> <i class="ph ph-paper-plane-tilt text-xl group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>`;
            }
        });
    </script>
</body>

</html>
